{% set name = "HipSTR2" %}
{% set version = "0.7" %}
{% set vcommit = "ad1e9b8b432d35407948262798bd0895f3e5a6c8" %}
{% set sha = "38fce0bb1b78bc3e17e2c25cc2d94086f8fb2ad78566318ed097d41574700825" %}
{% set username = "gymrek-lab" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ username }}/{{ name }}/archive/{{ vcommit }}.tar.gz
  sha256: {{ sha }}
  patches:
    - patches/0001-use-version-from-config.patch
    - patches/0002-adapt-src-for-newest-htslib.patch
build:
  number: 0
  run_exports:
      - {{ pin_subpackage('hipstr2', max_pin="x.x") }}
  skip: true  # [win]
  script:
    - mkdir -p "${PREFIX}/bin"
    - make version
    - STATIC=1 make HipSTR DenovoFinder
    - cp HipSTR DenovoFinder "${PREFIX}/bin/"

requirements:
  build:
    - make
    - {{ compiler('c') }} # for bundled cephes and htslib
    - {{ compiler('cxx') }}
  host:
    - xz
    - zlib
    - bzip2
    - htslib

test:
  commands:
    - HipSTR --help
    - DenovoFinder --help

about:
  home: https://github.com/{{ username }}/{{ name }}
  license: GPL-2
  license_file: LICENSE
  summary: Haplotype inference and phasing for Short Tandem Repeats
  description: Genotype and phase short tandem repeats using Illumina whole-genome sequencing data

extra:
  recipe-maintainers:
    - {{ username }}
  additional-platforms:
    - linux-aarch64
    - osx-arm64
